services:
  contractlens:
    build: .
    ports:
      - "3006:8501"
      - "8005:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    command:
      - sh
      - -c
      - |
        uvicorn contractlens.api:app --host 0.0.0.0 --port 8000 &
        sleep 3
        exec streamlit run src/contractlens/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
